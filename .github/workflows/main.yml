name: Build Extension
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8
      - name: Build with Ant
        run: ant
      - name: Upload AIX
        uses: actions/upload-artifact@v2
        with:
          name: GeotagLuxury-AIX
          path: out/*.aix
