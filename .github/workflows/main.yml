name: Build Extension
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Update ke v4
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4 # Update ke v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build with Ant
        run: ant
      - name: Upload AIX
        uses: actions/upload-artifact@v4 # INI YANG WAJIB v4
        with:
          name: GeotagLuxury-AIX
          path: out/*.aix
